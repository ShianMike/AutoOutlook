      <rect x="23"  y="19" width="22" height="18" fill="#f7b500" opacity="0.55"/>
      <rect x="46"  y="19" width="22" height="18" fill="#f7b500" opacity="0.75"/>
      <rect x="69"  y="19" width="22" height="18" fill="#ff8c00" opacity="0.75"/>
      <rect x="92"  y="19" width="22" height="18" fill="#ef3b2c" opacity="0.7"/>
      <rect x="115" y="19" width="22" height="18" fill="#b30000" opacity="0.75"/>
      <rect x="138" y="19" width="22" height="18" fill="#b30000" opacity="0.9"/>
