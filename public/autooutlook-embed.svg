<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AutoOutlook · Automated Convective Risk Intelligence</title>
  <desc id="desc">Neo-brutalist OG card for AutoOutlook showing the wordmark, telemetry console, hazard probability tile, and the SPC-style risk ramp.</desc>

  <defs>
    <!-- Halftone dot field for the paper background -->
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#111111" opacity="0.10"/>
    </pattern>
    <!-- Grid lines for the dashboard backdrop -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 L0 0 L0 32" fill="none" stroke="#111111" stroke-width="1" opacity="0.06"/>
    </pattern>
    <!-- Scanline overlay (CRT feel) -->
    <pattern id="scan" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" fill="#111111" opacity="0.05"/>
    </pattern>
    <!-- Dotted hatch for the right telemetry panel -->
    <pattern id="telegrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22 0 L0 0 L0 22" fill="none" stroke="#f5f1e8" stroke-width="1" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- ============== PAPER BACKDROP ============== -->
  <rect width="1200" height="630" fill="#f5f1e8"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ============== HARD-OFFSET SHADOW PANEL ============== -->
  <!-- Drop-shadow block behind the main panel -->
  <rect x="36" y="36" width="1132" height="562" fill="#111111"/>
  <!-- Main paper panel with thick ink border -->
  <rect x="24" y="24" width="1132" height="562" fill="#f5f1e8" stroke="#111111" stroke-width="6"/>
  <!-- Scanline overlay inside the panel -->
  <rect x="24" y="24" width="1132" height="562" fill="url(#scan)" opacity="0.55"/>

  <!-- ============== TOP STATUS BAR ============== -->
  <rect x="24" y="24" width="1132" height="60" fill="#111111"/>
  <!-- Brand chip -->
  <rect x="42" y="38" width="92" height="32" fill="#f5f1e8" stroke="#f5f1e8" stroke-width="2"/>
  <text x="52" y="60" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="14" font-weight="800" letter-spacing="4.5" fill="#111111">AO/01</text>
  <!-- AutoOutlook wordmark in top bar -->
  <text x="148" y="62" font-family="'Space Grotesk', 'Segoe UI', 'Arial Black', Helvetica, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5" fill="#f5f1e8">Auto<tspan fill="#f7b500">Outlook</tspan></text>
  <text x="308" y="62" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="10" font-weight="700" letter-spacing="2.5" fill="#f5f1e8" opacity="0.55">· CONVECTIVE RISK INTELLIGENCE</text>
  <!-- Live status (right side) -->
  <circle cx="840" cy="54" r="6" fill="#9ad62a"/>
  <text x="856" y="60" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="12" font-weight="700" letter-spacing="2.5" fill="#f5f1e8">LIVE · SPC OK</text>
  <rect x="994" y="38" width="148" height="32" fill="none" stroke="#f5f1e8" stroke-width="1.5" opacity="0.45"/>
  <text x="1068" y="60" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11" font-weight="700" letter-spacing="2" fill="#f5f1e8" text-anchor="middle">v0.1 · F+12H</text>

  <!-- Bottom edge of top bar accent stripe -->
  <rect x="24" y="84" width="1132" height="3" fill="#f7b500"/>

  <!-- ============== LEFT BLOCK · WORDMARK + TAGLINE ============== -->
  <!-- Section tag -->
  <g transform="translate(60 116)">
    <rect x="0" y="0" width="12" height="12" fill="#111111"/>
    <text x="22" y="11" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11" font-weight="700" letter-spacing="4" fill="#111111" opacity="0.65">[ SYSTEM 01 · OUTLOOK ]</text>
    <line x1="0" y1="22" x2="640" y2="22" stroke="#111111" stroke-width="1.5" opacity="0.18"/>
  </g>

  <!-- Massive AUTO wordmark -->
  <text x="56" y="248" font-family="'Space Grotesk', 'Segoe UI', 'Arial Black', Helvetica, sans-serif" font-size="148" font-weight="800" letter-spacing="-4" fill="#111111">Auto</text>
  <!-- Massive OUTLOOK wordmark in amber -->
  <text x="56" y="368" font-family="'Space Grotesk', 'Segoe UI', 'Arial Black', Helvetica, sans-serif" font-size="148" font-weight="800" letter-spacing="-4" fill="#f7b500">Outlook</text>

  <!-- Subtitle bar (dark) -->
  <rect x="56" y="404" width="640" height="48" fill="#111111"/>
  <text x="76" y="436" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="15" font-weight="700" letter-spacing="2.5" fill="#f5f1e8">▸ AUTOMATED · HRRR · XGBOOST · SPC VERIFIED</text>

  <!-- Tagline -->
  <text x="58" y="486" font-family="'Inter', 'Segoe UI', 'Helvetica', Arial, sans-serif" font-size="21" font-weight="700" fill="#111111" opacity="0.85">Verified convective outlooks for forecast hours</text>
  <text x="58" y="514" font-family="'Inter', 'Segoe UI', 'Helvetica', Arial, sans-serif" font-size="21" font-weight="700" fill="#111111" opacity="0.85"><tspan font-family="'JetBrains Mono', 'Consolas', monospace" font-weight="800" fill="#111111">f00–f48</tspan> — without a human in the loop.</text>

  <!-- Bottom row intentionally left blank for breathing room. -->

  <!-- ============== RIGHT BLOCK · TELEMETRY CONSOLE ============== -->
  <g transform="translate(728 120)">
    <!-- Shadow offset -->
    <rect x="10" y="10" width="392" height="384" fill="#111111"/>
    <!-- Console body -->
    <rect x="0" y="0" width="392" height="384" fill="#111111" stroke="#111111" stroke-width="4"/>
    <rect x="0" y="0" width="392" height="384" fill="url(#telegrid)"/>

    <!-- Corner crosshairs -->
    <g stroke="#f5f1e8" stroke-width="2" fill="none">
      <path d="M6 6 L6 18 M6 6 L18 6"/>
      <path d="M386 6 L386 18 M386 6 L374 6"/>
      <path d="M6 378 L6 366 M6 378 L18 378"/>
      <path d="M386 378 L386 366 M386 378 L374 378"/>
    </g>

    <!-- Top strip -->
    <rect x="0" y="0" width="392" height="40" fill="#111111"/>
    <line x1="0" y1="40" x2="392" y2="40" stroke="#f5f1e8" stroke-width="2" opacity="0.25"/>
    <circle cx="18" cy="20" r="4" fill="#9ad62a"/>
    <text x="32" y="26" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="12" font-weight="700" letter-spacing="3" fill="#f5f1e8">◢ TELEMETRY · F+12H</text>
    <text x="382" y="26" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="11" font-weight="700" letter-spacing="2.5" fill="#f5f1e8" opacity="0.6" text-anchor="end">SYNC</text>

    <!-- Stat grid (2 cols x 2 rows) -->
    <g font-family="'JetBrains Mono', 'Consolas', monospace">
      <!-- OUTLOOK · ENH -->
      <rect x="14" y="56" width="178" height="64" fill="#0a0a0a" stroke="#f5f1e8" stroke-width="1" stroke-opacity="0.18"/>
      <text x="24" y="78" font-size="10" font-weight="700" letter-spacing="2.5" fill="#f5f1e8" opacity="0.5">OUTLOOK</text>
      <rect x="24" y="86" width="62" height="22" fill="#ef3b2c"/>
      <text x="33" y="102" font-family="'Space Grotesk', 'Segoe UI', 'Arial Black', Helvetica, sans-serif" font-size="14" font-weight="800" letter-spacing="-0.3" fill="#f5f1e8">ENH</text>
      <text x="96" y="102" font-size="10" font-weight="700" letter-spacing="1.5" fill="#f5f1e8" opacity="0.7">C-PLAINS</text>

      <!-- MAIN HAZARD -->
      <rect x="200" y="56" width="178" height="64" fill="#0a0a0a" stroke="#f5f1e8" stroke-width="1" stroke-opacity="0.18"/>
      <text x="210" y="78" font-size="10" font-weight="700" letter-spacing="2.5" fill="#f5f1e8" opacity="0.5">MAIN HAZARD</text>
      <text x="210" y="104" font-family="'Space Grotesk', 'Segoe UI', 'Arial Black', Helvetica, sans-serif" font-size="16" font-weight="800" letter-spacing="-0.3" fill="#f5f1e8">TORNADO</text>
      <text x="370" y="104" font-size="11" font-weight="700" letter-spacing="1.5" fill="#9ad62a" text-anchor="end">72%</text>

      <!-- ML MODEL -->
      <rect x="14" y="128" width="178" height="48" fill="#0a0a0a" stroke="#f5f1e8" stroke-width="1" stroke-opacity="0.18"/>
      <text x="24" y="148" font-size="10" font-weight="700" letter-spacing="2.5" fill="#f5f1e8" opacity="0.5">ML MODEL</text>
      <text x="24" y="168" font-family="'Space Grotesk', 'Segoe UI', 'Arial Black', Helvetica, sans-serif" font-size="13" font-weight="800" letter-spacing="-0.3" fill="#9ad62a">ACTIVE · XGB</text>

      <!-- SPC AGREE -->
      <rect x="200" y="128" width="178" height="48" fill="#0a0a0a" stroke="#f5f1e8" stroke-width="1" stroke-opacity="0.18"/>
      <text x="210" y="148" font-size="10" font-weight="700" letter-spacing="2.5" fill="#f5f1e8" opacity="0.5">SPC AGREE</text>
      <text x="210" y="168" font-family="'Space Grotesk', 'Segoe UI', 'Arial Black', Helvetica, sans-serif" font-size="13" font-weight="800" letter-spacing="-0.3" fill="#f5f1e8">84% · 40 KM</text>
    </g>

