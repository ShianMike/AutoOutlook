      <rect x="299" y="19" width="22" height="18" fill="#9ad62a" opacity="0.35"/>
      <rect x="322" y="19" width="22" height="18" fill="#9ad62a" opacity="0.2"/>
      <rect x="345" y="19" width="22" height="18" fill="#9ad62a" opacity="0.1"/>

      <!-- Row 2 (peak) -->
