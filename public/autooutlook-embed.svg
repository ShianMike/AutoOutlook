      <rect x="23"  y="38" width="22" height="18" fill="#f7b500" opacity="0.7"/>
      <rect x="46"  y="38" width="22" height="18" fill="#ff8c00" opacity="0.75"/>
      <rect x="69"  y="38" width="22" height="18" fill="#ef3b2c" opacity="0.8"/>
