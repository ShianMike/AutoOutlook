      <rect x="161" y="38" width="22" height="18" fill="#7a0177"/>
      <rect x="184" y="38" width="22" height="18" fill="#7a0177" opacity="0.95"/>
      <rect x="207" y="38" width="22" height="18" fill="#b30000" opacity="0.9"/>
