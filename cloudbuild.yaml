substitutions:
  _REGION: us-central1
  _SERVICE: autooutlook
  _REPOSITORY: cloud-run-source-deploy

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - 2Gi
      - --cpu
      - "2"
      - --timeout
      - "120"
      - --concurrency
      - "20"
      - --min-instances
      - "0"
      - --max-instances
      - "1"
      - --cpu-boost
      - --set-env-vars
      - AUTOOUTLOOK_CORS_ORIGINS=*,AUTOOUTLOOK_FORECAST_SOURCE=artifact,AUTOOUTLOOK_ENABLE_LIVE_BUILD=false,AUTOOUTLOOK_ARTIFACT_BUCKET=autooutlook-artifacts-project-f47ca9d9-31bc-4a21-963,WEB_CONCURRENCY=1,WEB_THREADS=20,GUNICORN_TIMEOUT=120

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
