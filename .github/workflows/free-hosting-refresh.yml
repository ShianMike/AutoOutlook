name: Refresh static AutoOutlook artifacts

on:
  schedule:
    # Matches the former Windows Task Scheduler cycle-aligned times:
    # 01:30Z, 07:30Z, 13:30Z, and 19:30Z.
    - cron: '30 1,7,13,19 * * *'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Deploy even when the production index already reports the same cycle.'
        required: false
        default: 'false'

concurrency:
  group: autooutlook-static-refresh
  cancel-in-progress: false

permissions:
  contents: read

env:
  AUTOOUTLOOK_HOUR_WORKERS: ${{ vars.AUTOOUTLOOK_HOUR_WORKERS || '3' }}
  AUTOOUTLOOK_RANGE_WORKERS: ${{ vars.AUTOOUTLOOK_RANGE_WORKERS || '4' }}
  AUTOOUTLOOK_RANGE_COALESCE_GAP_BYTES: ${{ vars.AUTOOUTLOOK_RANGE_COALESCE_GAP_BYTES || '2097152' }}
  AUTOOUTLOOK_GRID_STRIDE: ${{ vars.AUTOOUTLOOK_GRID_STRIDE || '3' }}
  AUTOOUTLOOK_TILE_STRIDE: ${{ vars.AUTOOUTLOOK_TILE_STRIDE || '1' }}
  AUTOOUTLOOK_PRODUCTION_INDEX_URL: ${{ vars.AUTOOUTLOOK_PRODUCTION_INDEX_URL || 'https://autooutlook.tech/api/outlook/incremental' }}
  CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'autooutlook-pages' }}
  CLOUDFLARE_PAGES_BRANCH: ${{ vars.CLOUDFLARE_PAGES_BRANCH || 'master' }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      AUTOOUTLOOK_REPO_DIR: ${{ github.workspace }}
      AUTOOUTLOOK_VENV_DIR: ${{ github.workspace }}/.venv
      AUTOOUTLOOK_STATE_DIR: ${{ github.workspace }}/.autooutlook/state
      AUTOOUTLOOK_HRRR_CACHE_DIR: ${{ github.workspace }}/backend/cache/hrrr_selected
      AUTOOUTLOOK_LOG_DIR: ${{ github.workspace }}/.autooutlook/logs

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Refresh and deploy static artifacts
        shell: pwsh
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          $parameters = @{ SkipEnvFile = $true }
          if ("${{ github.event.inputs.force_deploy || 'false' }}".ToLowerInvariant() -eq "true") {
            $parameters.Force = $true
          }
          ./scripts/windows/refresh-autooutlook.ps1 @parameters
