name: Publish AutoOutlook package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish, for example v0.8"
        required: true
        default: "v0.8"

concurrency:
  group: autooutlook-package-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ghcr:
    name: Build and publish GHCR image
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image metadata
        id: image
        shell: bash
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          raw_version="${{ github.event.inputs.version }}"
          if [ -z "$raw_version" ]; then
            raw_version="${GITHUB_REF_NAME}"
          fi
          version="${raw_version#v}"
          version_tag="v${version}"
          image="ghcr.io/${owner_lc}/autooutlook"

          {
            echo "image=${image}"
            echo "version=${version}"
            echo "version_tag=${version_tag}"
            echo "tags<<EOF"
            echo "${image}:${version_tag}"
            echo "${image}:${version}"
            echo "${image}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.title=AutoOutlook
            org.opencontainers.image.description=Automated severe-weather risk intelligence from HRRR data with SPC-style outlook artifacts and a public React dashboard.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://autooutlook.tech
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.version_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
